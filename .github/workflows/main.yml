# wakapi 代码统计配置

name: WakaTime Readme

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@370590ad8da8f54282ed92aa42b7c25ecbd5a9a6 # master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # 提交消息
          COMMIT_MESSAGE: Update Wakapi stats
          # 图形
          BLOCKS: "⬜🟨🟩"
          # 时间范围
          TIME_RANGE: last_7_days
          # 显示时间
          SHOW_TIME: true
          SHOW_TITLE: true
          
